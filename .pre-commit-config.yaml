repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --fix
        language: system
        files: ^app/.*\.js$


      - id: pdm-lock
        name: pdm lock
        entry: bash -c 'pdm lock --quiet'
        language: system
        always_run: true
        pass_filenames: false

      - id: uv-lock
        name: uv lock
        entry: bash -c 'uv lock --quiet'
        language: system
        always_run: true
        pass_filenames: false
